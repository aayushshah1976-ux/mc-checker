<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Minecraft Usernames</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #4ade80;
    --red: #f87171;
    --bg: #0a0f0c;
    --card: #0f1a13;
    --border: rgba(74,222,128,0.18);
    --text: #d4f5df;
    --muted: #4a7a5a;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    padding: 24px;
  }

  /* subtle grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,222,128,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,0.025) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 3vw, 15px);
    color: var(--green);
    text-align: center;
    line-height: 1.8;
    margin-bottom: 32px;
    text-shadow: 0 0 24px rgba(74,222,128,0.5);
    letter-spacing: 1px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 18px 20px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--green);
  }
  input::placeholder { color: var(--muted); font-size: 14px; letter-spacing: 2px; }
  input:focus {
    border-color: rgba(74,222,128,0.45);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.07);
    border-radius: 10px 10px 0 0;
  }

  button {
    width: 100%;
    padding: 17px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.35);
    border-top: none;
    border-radius: 0 0 10px 10px;
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
  }
  button:hover:not(:disabled) {
    background: rgba(74,222,128,0.18);
    box-shadow: 0 0 20px rgba(74,222,128,0.12);
    color: #fff;
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* error inline */
  .inline-err {
    height: 0;
    overflow: hidden;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--red);
    margin-top: 10px;
    padding: 0 4px;
    transition: height 0.2s;
  }
  .inline-err.show { height: 18px; }

  /* result */
  .result {
    margin-top: 24px;
    border-radius: 12px;
    padding: 28px 24px;
    text-align: center;
    display: none;
    flex-direction: column;
    gap: 10px;
    animation: up 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result.show { display: flex; }
  .result.avail {
    background: rgba(74,222,128,0.06);
    border: 1px solid rgba(74,222,128,0.28);
    box-shadow: 0 0 40px rgba(74,222,128,0.07);
  }
  .result.taken {
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.28);
    box-shadow: 0 0 40px rgba(248,113,113,0.07);
  }

  .result-icon { font-size: 40px; line-height: 1; }

  .result-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .avail .result-label { color: var(--green); text-shadow: 0 0 16px rgba(74,222,128,0.6); }
  .taken .result-label { color: var(--red);   text-shadow: 0 0 16px rgba(248,113,113,0.6); }

  .result-name {
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
  }

  /* loader dots */
  .dots {
    display: inline-flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 1px;
    background: var(--green);
    animation: pulse 0.7s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%,100% { opacity: 0.2; transform: scaleY(0.5); }
    50% { opacity: 1; transform: scaleY(1.3); }
  }
  @keyframes up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Check Minecraft<br>Usernames</h1>

  <div class="field">
    <input
      id="inp"
      type="text"
      placeholder="username..."
      maxlength="16"
      autocomplete="off"
      spellcheck="false"
      oninput="onType()"
      onkeydown="if(event.key==='Enter')check()"
    >
    <button id="btn" onclick="check()">SCAN USERNAME</button>
  </div>

  <div class="inline-err" id="err"></div>

  <div class="result" id="result">
    <div class="result-icon" id="icon"></div>
    <div class="result-label" id="label"></div>
    <div class="result-name" id="rname"></div>
  </div>
</div>

<script>
  const inp    = document.getElementById('inp');
  const btn    = document.getElementById('btn');
  const errEl  = document.getElementById('err');
  const result = document.getElementById('result');
  const icon   = document.getElementById('icon');
  const label  = document.getElementById('label');
  const rname  = document.getElementById('rname');

  function onType() {
    // clear error and result on new typing
    setErr('');
    result.className = 'result';
  }

  function setErr(msg) {
    errEl.textContent = msg;
    errEl.classList.toggle('show', !!msg);
  }

  function validate(u) {
    if (!u) return 'Enter a username.';
    if (u.length < 3 || u.length > 16) return 'Must be 3–16 characters.';
    if (/\s/.test(u)) return 'No spaces allowed.';
    if (!/^[a-zA-Z0-9_]+$/.test(u)) return 'Only A–Z, 0–9, and _ allowed.';
    return null;
  }

  async function check() {
    const u = inp.value.trim();
    const err = validate(u);
    if (err) { setErr(err); return; }

    // loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    result.className = 'result';
    setErr('');

    try {
      const res = await fetch(`/api/check?username=${encodeURIComponent(u)}`);
      const data = await res.json();

      if (data.available === true) {
        result.className = 'result avail show';
        icon.textContent  = '✅';
        label.textContent = 'AVAILABLE';
        rname.textContent = u;
      } else if (data.available === false) {
        result.className = 'result taken show';
        icon.textContent  = '❌';
        label.textContent = 'TAKEN';
        rname.textContent = u;
      } else {
        setErr(data.error || 'Something went wrong. Try again.');
      }
    } catch {
      setErr('Network error — try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'SCAN USERNAME';
    }
  }
</script>
</body>
</html>
